<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Alejandro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="cabecera">
        <nav class="navbar">
            <div class="navbar__logo">
                <span>Alejandro Mella</span>
            </div>
            <ul class="navbar__links">
                <li><a href="index.html#sobre-mi">Sobre mí</a></li>
                <li><a href="index.html#tecnologias">Tecnologías</a></li>
                <li><a href="index.html#aficiones">Aficiones</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
            <button id="toggle-dark" class="theme-toggle" aria-label="Cambiar tema">🌙</button>
        </nav>
    </header>
    <main>
        <section class="contacto" id="contacto">
            <h2>Contacto</h2>
            <form class="contacto__formulario">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                <button type="submit">Enviar</button>
            </form>
            <ul class="contacto__datos">
                <li>Teléfono: +569-50550305</li>
                <li>Email: alejandros.mella5@gmail.com</li>
                <li>Ubicación: Temuco - San Fernando</li>
            </ul>
        </section>
    </main>
    <footer class="footer">
        <p>© 2026 · Portafolio profesional</p>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
